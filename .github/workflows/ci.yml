name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: "Build and Test"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js | ${{ matrix.node}}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node}}
          cache: "yarn"
      - run: yarn --frozen-lockfile
      - run: yarn run test
